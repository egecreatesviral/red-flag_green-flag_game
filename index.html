<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project OVERDRIVE 🧠</title>
    <!-- Tailwind CSS ve Alpine.js Altyapısı -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #03050a;
            overflow-x: hidden;
        }
        .code-font {
            font-family: 'Fira Code', monospace;
        }
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.12;
            pointer-events: none;
        }
        .scanline {
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, rgba(168, 85, 247, 0), rgba(168, 85, 247, 0.4), rgba(168, 85, 247, 0));
            position: absolute;
            animation: scan 4s linear infinite;
            z-index: 5;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }
        /* Glitch Efekti (Butonlar İçin) */
        .glitch-red:hover {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6), -3px 0 #ef4444, 3px 0 #b91c1c;
        }
        .glitch-green:hover {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.6), -3px 0 #22c55e, 3px 0 #15803d;
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col items-center justify-center p-4 selection:bg-purple-500 selection:text-white" x-data="overdriveApp()" x-init="initMatrix()">

    <!-- MATRİX KOD YAĞMURU ARKA PLAN -->
    <canvas id="matrix-canvas"></canvas>

    <!-- LAZER TARAMA ÇİZGİSİ -->
    <div class="scanline"></div>

    <!-- GLOBAL DİL DEĞİŞTİRME BUTONU -->
    <div class="absolute top-4 right-4 z-20">
        <button @click="toggleLang()" class="px-4 py-2 bg-[#090d16]/80 border border-purple-500/30 rounded-xl text-purple-300 hover:text-white text-xs font-bold transition-all duration-300 code-font cursor-pointer shadow-[0_0_15px_rgba(168,85,247,0.1)]">
            LANG: <span x-text="lang.toUpperCase()"></span>
        </button>
    </div>

    <!-- ANA ARAYÜZ PANELİ (Liquid Glass Tasarımı) -->
    <div class="w-full max-w-2xl bg-[#090d16]/70 backdrop-blur-3xl border border-purple-500/20 shadow-[0_0_60px_rgba(168,85,247,0.15)] rounded-3xl p-6 md:p-8 z-10 relative overflow-hidden min-h-[480px] flex flex-col justify-center transition-all duration-500"
         :class="{'border-red-500/40 shadow-[0_0_60px_rgba(239,68,68,0.15)]': glitchState === 'red', 'border-green-500/40 shadow-[0_0_60px_rgba(34,197,94,0.15)]': glitchState === 'green'}">
        
        <!-- Siberpunk Çerçeve Süsleri -->
        <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-purple-500/40 rounded-tl-xl pointer-events-none"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-purple-500/40 rounded-tr-xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-purple-500/40 rounded-bl-xl pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-purple-500/40 rounded-br-xl pointer-events-none"></div>

        <!-- 📟 AŞAMA 1: SİBERPUNK TERMINAL GİRİŞİ -->
        <div x-show="currentStage === 'boot'" class="code-font text-left space-y-3 text-sm text-purple-400">
            <div class="flex items-center gap-2 border-b border-purple-500/20 pb-2 mb-4">
                <span class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="text-xs text-slate-500 ml-2">OVERDRIVE_OS_V2.sh</span>
            </div>
            
            <template x-for="(log, idx) in bootLogs" :key="idx">
                <div class="flex items-start gap-2">
                    <span class="text-purple-600 font-bold">></span>
                    <span class="text-slate-300" x-text="log"></span>
                </div>
            </template>

            <div x-show="isBootingComplete" class="pt-4 text-center">
                <button @click="enterCoreSystem()" class="px-6 py-3 bg-purple-600/20 hover:bg-purple-600 border border-purple-500 text-purple-200 hover:text-white font-bold rounded-xl transition-all duration-300 shadow-[0_0_15px_rgba(168,85,247,0.3)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)] cursor-pointer tracking-wider animate-pulse">
                    <span x-text="t('enterBtn')"></span>
                </button>
            </div>
        </div>

        <!-- 🎮 AŞAMA 2: INTERAKTİF OYUN MOTORU (MAIN HUD) -->
        <div x-show="currentStage === 'main_hud'" x-transition class="flex flex-col justify-between h-full space-y-6">
            
            <!-- Üst Bilgi Çubuğu ve Canlı Nabız/Grafik Efekti -->
            <div class="flex justify-between items-center border-b border-purple-500/10 pb-3 code-font text-xs text-slate-400">
                <div class="flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-purple-500 animate-ping"></span>
                    <span>MATRIX_SCANNER: <span class="text-purple-400" x-text="currentQuestion + 1"></span>/<span x-text="questions.length"></span></span>
                </div>
                <div class="text-right">
                    <span>TOXICITY: <span class="text-red-400 font-bold" x-text="toxicScore + '%'"></span></span>
                </div>
            </div>

            <!-- Soru Alanı -->
            <div class="my-auto py-4 space-y-4">
                <div class="text-xs font-bold text-purple-400 uppercase tracking-widest code-font">[ TARGET_BEHAVIOR_ANALYSIS ]</div>
                <h2 class="text-xl md:text-2xl font-bold text-white tracking-wide leading-relaxed min-h-[80px]" x-text="questions[currentQuestion][lang]"></h2>
            </div>

            <!-- Karar Butonları (🚩 RED FLAG vs 💚 GREEN FLAG) -->
            <div class="grid grid-cols-2 gap-4 pt-4">
                <!-- RED FLAG -->
                <button @click="handleChoice('red')" class="glitch-red group px-6 py-4 bg-red-950/20 hover:bg-red-600 border border-red-500/30 hover:border-red-500 rounded-2xl transition-all duration-300 cursor-pointer flex flex-col items-center justify-center gap-1">
                    <span class="text-2xl group-hover:scale-125 transition-transform duration-300">🚩</span>
                    <span class="text-xs font-bold uppercase tracking-wider text-red-400 group-hover:text-white code-font">RED FLAG</span>
                </button>

                <!-- GREEN FLAG -->
                <button @click="handleChoice('green')" class="glitch-green group px-6 py-4 bg-green-950/20 hover:bg-green-600 border border-green-500/30 hover:border-green-500 rounded-2xl transition-all duration-300 cursor-pointer flex flex-col items-center justify-center gap-1">
                    <span class="text-2xl group-hover:scale-125 transition-transform duration-300">💚</span>
                    <span class="text-xs font-bold uppercase tracking-wider text-green-400 group-hover:text-white code-font">GREEN FLAG</span>
                </button>
            </div>
        </div>

        <!-- 📊 AŞAMA 3: RAPORLAMA VE ANALİZ EKRANI (SKOR) -->
        <div x-show="currentStage === 'result'" x-transition class="text-center space-y-6">
            <div class="inline-block p-4 rounded-full bg-purple-500/10 border border-purple-500/30 mb-2 animate-bounce">
                <span class="text-4xl">🧠</span>
            </div>
            <h2 class="text-2xl font-extrabold tracking-wider text-white uppercase">[ <span x-text="t('resultTitle')"></span> ]</h2>
            
            <!-- Büyük Dijital Skor Paneli -->
            <div class="bg-[#111726]/80 border border-purple-500/20 rounded-2xl p-6 max-w-sm mx-auto shadow-inner">
                <div class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-purple-500 code-font mb-2" x-text="toxicScore + '%'"></div>
                <div class="text-xs uppercase tracking-widest text-slate-400 code-font" x-text="t('verdict')"></div>
                <p class="text-sm text-purple-300 mt-3 font-semibold tracking-wide" x-text="getResultComment()"></p>
            </div>

            <!-- Yeniden Başlat Butonu -->
            <button @click="restartGame()" class="mt-4 px-6 py-2 border border-purple-500/40 text-purple-400 hover:text-white hover:bg-purple-600/20 rounded-xl text-xs font-bold transition-all duration-300 code-font cursor-pointer">
                // SYSTEM_REBOOT()
            </button>
        </div>

    </div>

    <!-- 🛠️ EN KOLAY VE HAVALI CANLI ZİYARETÇİ SAYAÇ LOGOSU (HITS BADGE) -->
    <!-- Bu logo projenin en altında durur ve sitene her tıklanışta sayıyı tamamen otomatik olarak artırır. -->
    <div class="mt-6 z-10 opacity-60 hover:opacity-100 transition-opacity duration-300 scale-90">
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgithub.com%2Fproject_overdrive&count_bg=%23A855F7&title_bg=%23090D16&title=SYSTEM_VISITORS&edge_flat=false" alt="Visitor Counter"/>
    </div>

    <!-- CORE JAVASCRIPT ENGINE -->
    <script>
        function overdriveApp() {
            return {
                lang: 'tr',
                currentStage: 'boot',
                bootLogs: [],
                isBootingComplete: false,
                currentQuestion: 0,
                toxicScore: 0,
                glitchState: null, // 'red' veya 'green' sistem anlık renk değiştirecek

                // Dil Sözlüğü
                translations: {
                    tr: {
                        enterBtn: "CORE_SYSTEM_ENTER()",
                        resultTitle: "NÖRONAL ANALİZ RAPORU",
                        verdict: "TOKSİKLİK VE RED FLAG ORANI",
                        resultPerfect: "🤖 Kusursuz Mantık. Duygusal zayıflık sıfır, tam bir Green Flag abidesi.",
                        resultMid: "⚡ Kararsız Yapı. Standart insan kusurları tespit edildi, kabul edilebilir.",
                        resultToxic: "💀 KRİTİK SEVİYE! Tehlikeli derecede toksik, uzak durulması gereken profil."
                    },
                    en: {
                        enterBtn: "CORE_SYSTEM_ENTER()",
                        resultTitle: "NEURAL ANALYSIS REPORT",
                        verdict: "TOXICITY & RED FLAG RATIO",
                        resultPerfect: "🤖 Flawless Logic. Zero emotional vulnerability, a true Green Flag hero.",
                        resultMid: "⚡ Unstable State. Standard human bugs detected, acceptable profile.",
                        resultToxic: "💀 CRITICAL LEVEL! Dangerously toxic profile, immediate isolation advised."
                    }
                },

                // SORU HAVUZU (Hem Türkçe Hem İngilizce)
                questions: [
                    {
                        tr: "Bütün gün bilgisayar başında kod yazıp mesajlara 5 saat sonra dönüyor?",
                        en: "Spends all day coding on the computer and replies to messages 5 hours later?"
                    },
                    {
                        tr: "Sırf 'estetik duruyor' diye bütün odasını siberpunk mor ışıkla doldurmuş?",
                        en: "Filled their entire room with cyberpunk purple lights just because 'it looks aesthetic'?"
                    },
                    {
                        tr: "Instagram'da 2000 kişiyi takip ediyor ama seni yakın arkadaşlarına eklemiyor?",
                        en: "Follows 2000 people on Instagram but doesn't add you to their Close Friends?"
                    },
                    {
                        tr: "Hesap geldiğinde aniden telefon görüşmesi varmış gibi masadan kalkıyor?",
                        en: "When the bill arrives, suddenly gets up from the table pretending to have a call?"
                    },
                    {
                        tr: "Sürekli yapay zekanın dünyayı ele geçireceğini söyleyip duruyor?",
                        en: "Constantly talks about how AI is going to take over the world?"
                    }
                ],

                // Logların akma simülasyonu listesi
                allLogs: [
                    "BOOT_SEQUENCE_INITIALIZED...",
                    "LOADING NEURAL NETWORKS...",
                    "CONNECTING TO HOST_SERVER... [OK]",
                    "DEPLOYING LIQUID_GLASS_INTERFACE...",
                    "VISITOR_COUNTER: CONNECTED",
                    "DEEP CHARACTER ANALYZER: ACTIVE."
                ],

                init() {
                    let delay = 0;
                    this.allLogs.forEach((log, index) => {
                        setTimeout(() => {
                            this.bootLogs.push(log);
                            if (index === this.allLogs.length - 1) {
                                this.isBootingComplete = true;
                            }
                        }, delay);
                        delay += 300;
                    });
                },

                t(key) {
                    return this.translations[this.lang][key];
                },

                toggleLang() {
                    this.lang = this.lang === 'tr' ? 'en' : 'tr';
                },

                enterCoreSystem() {
                    this.currentStage = 'main_hud';
                },

                // Butonlara basıldığında skoru hesaplayan ve ekranı titreten (glitch) fonksiyon
                handleChoice(type) {
                    // Ekran parlaması efekti
                    this.glitchState = type;
                    setTimeout(() => this.glitchState = null, 250);

                    // Red flag verilirse toksiklik skoru artar
                    if (type === 'red') {
                        this.toxicScore += Math.floor(100 / this.questions.length);
                    }

                    // Sıradaki soruya geç veya bitir
                    if (this.currentQuestion < this.questions.length - 1) {
                        this.currentQuestion++;
                    } else {
                        if (this.toxicScore > 100) this.toxicScore = 100;
                        this.currentStage = 'result';
                    }
                },

                getResultComment() {
                    if (this.toxicScore <= 20) return this.t('resultPerfect');
                    if (this.toxicScore <= 60) return this.t('resultMid');
                    return this.t('resultToxic');
                },

                restartGame() {
                    this.currentQuestion = 0;
                    this.toxicScore = 0;
                    this.currentStage = 'main_hud';
                },

                // Klasik Matrix kod yağmuru arka plan motoru
                initMatrix() {
                    const canvas = document.getElementById('matrix-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    const alphabet = "0101010101100101010110101".split("");
                    const fontSize = 16;
                    const columns = canvas.width / fontSize;
                    const rainDrops = Array(Math.floor(columns)).fill(1);

                    const draw = () => {
                        ctx.fillStyle = 'rgba(3, 5, 10, 0.05)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#a855f7';
                        ctx.font = fontSize + 'px monospace';

                        for (let i = 0; i < rainDrops.length; i++) {
                            const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                                rainDrops[i] = 0;
                            }
                            rainDrops[i]++;
                        }
                    };
                    setInterval(draw, 33);
                    window.addEventListener('resize', () => {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                    });
                }
            }
        }
    </script>
</body>
</html>
