<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project OVERDRIVE 🧠</title>
    <!-- Tailwind CSS ve Alpine.js Altyapısı -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d0f1a 0%, #05060b 100%);
            overflow-x: hidden;
        }
        .code-font {
            font-family: 'Fira Code', monospace;
        }
        
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.05;
            pointer-events: none;
        }

        /* 🍎 APPLE LIQUID GLASS */
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                inset 0 10px 20px rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .glow-red {
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.1), inset 0 1px 1px rgba(239, 68, 68, 0.2);
        }
        .glow-green {
            border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.1), inset 0 1px 1px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col items-center justify-center p-4 selection:bg-purple-500 selection:text-white" x-data="overdriveApp()" x-init="initMatrix()">

    <canvas id="matrix-canvas"></canvas>

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <!-- MAIN CARD -->
    <div class="w-full max-w-xl liquid-glass rounded-[2rem] p-8 md:p-10 z-10 relative flex flex-col justify-center min-h-[480px]"
         :class="{'glow-red': glitchState === 'red', 'glow-green': glitchState === 'green'}">
        
        <!-- 📟 AŞAMA 1: START SCREEN -->
        <div x-show="currentStage === 'boot'" class="code-font text-left space-y-4 text-xs md:text-sm text-purple-300/80">
            <div class="flex items-center justify-between border-b border-white/5 pb-3 mb-4">
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-white/10"></span>
                    <span class="text-[11px] text-slate-500 tracking-wider">OVERDRIVE_OS.SECURE</span>
                </div>
                <button @click="toggleLang()" class="lang-btn px-3 py-1 rounded-full text-[11px] text-white font-medium cursor-pointer flex items-center gap-1">
                    <span x-text="lang === 'tr' ? '🇹🇷 TR' : '🇬🇧 EN'"></span>
                </button>
            </div>
            
            <div class="space-y-2 min-h-[140px]">
                <template x-for="(log, idx) in bootLogs" :key="idx">
                    <div class="flex items-center gap-2">
                        <span class="text-purple-500/50">•</span>
                        <span class="text-slate-300 font-medium" x-text="log"></span>
                    </div>
                </template>
            </div>

            <div x-show="isBootingComplete" class="pt-6 text-center">
                <button @click="enterCoreSystem()" class="w-full sm:w-auto px-8 py-3.5 bg-white text-black font-bold rounded-full transition-all duration-300 hover:scale-105 active:scale-95 cursor-pointer text-sm shadow-[0_10px_25px_rgba(255,255,255,0.15)] tracking-wide">
                    <span x-text="t('enterBtn')"></span>
                </button>
            </div>
        </div>

        <!-- 🎮 AŞAMA 2: INTERACTIVE INTERFACE (MAIN HUD) -->
        <div x-show="currentStage === 'main_hud'" x-transition.opacity.duration.500ms class="flex flex-col justify-between h-full space-y-8">
            
            <div class="flex justify-between items-center text-[11px] tracking-widest text-slate-500 font-bold uppercase code-font border-b border-white/5 pb-4">
                <div class="flex items-center gap-3">
                    <button @click="toggleLang()" class="lang-btn px-2.5 py-1 rounded-full text-[10px] text-white font-medium cursor-pointer normal-case tracking-normal">
                        <span x-text="lang === 'tr' ? '🇹🇷 TR' : '🇬🇧 EN'"></span>
                    </button>
                    <span class="hidden sm:inline text-white/20">|</span>
                    <span class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-purple-500 animate-pulse"></span>
                        <span>STAGE <span class="text-white" x-text="currentQuestion + 1"></span>/<span x-text="questions.length"></span></span>
                    </span>
                </div>
                <div>
                    <span>TOXIC_RATIO: <span class="text-white" x-text="toxicScore + '%'"></span></span>
                </div>
            </div>

            <div class="py-4 space-y-3">
                <div class="text-[10px] font-extrabold text-purple-400 tracking-[0.2em] uppercase code-font">// NEURAL_INPUT</div>
                <h2 class="text-lg md:text-xl font-bold text-white tracking-tight leading-relaxed min-h-[100px]" x-text="questions[currentQuestion][lang]"></h2>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button @click="handleChoice('red')" class="glass-btn group px-6 py-5 rounded-2xl cursor-pointer flex flex-col items-center justify-center gap-2 hover:bg-red-500/10 hover:border-red-500/30">
                    <span class="text-2xl group-hover:scale-110 transition-transform duration-300">🚩</span>
                    <span class="text-xs font-bold tracking-widest text-slate-400 group-hover:text-red-400 code-font transition-colors">RED FLAG</span>
                </button>

                <button @click="handleChoice('green')" class="glass-btn group px-6 py-5 rounded-2xl cursor-pointer flex flex-col items-center justify-center gap-2 hover:bg-green-500/10 hover:border-green-500/30">
                    <span class="text-2xl group-hover:scale-110 transition-transform duration-300">💚</span>
                    <span class="text-xs font-bold tracking-widest text-slate-400 group-hover:text-green-400 code-font transition-colors">GREEN FLAG</span>
                </button>
            </div>
        </div>

        <!-- 📊 AŞAMA 3: RESULT REPORT -->
        <div x-show="currentStage === 'result'" x-transition.opacity.duration.500ms class="text-center space-y-8 py-4">
            <div class="inline-flex p-4 rounded-full bg-white/[0.02] border border-white/10 shadow-inner">
                <span class="text-3xl">🧠</span>
            </div>
            
            <div class="space-y-2">
                <h2 class="text-sm font-extrabold tracking-[0.25em] text-slate-400 uppercase code-font" x-text="t('resultTitle')"></h2>
                <div class="text-6xl font-black tracking-tighter text-white py-4" x-text="toxicScore + '%'"></div>
                <div class="text-[11px] uppercase tracking-widest text-purple-400 font-bold code-font" x-text="t('verdict')"></div>
            </div>

            <p class="text-sm text-slate-300 max-w-sm mx-auto leading-relaxed font-medium bg-white/[0.01] border border-white/5 rounded-2xl p-4 shadow-sm" x-text="getResultComment()"></p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
                <button @click="restartGame()" class="px-6 py-2.5 glass-btn rounded-full text-xs font-bold text-slate-400 hover:text-white cursor-pointer code-font hover:border-white/20">
                    // SYSTEM_REBOOT()
                </button>
                <button @click="toggleLang()" class="lang-btn px-4 py-2 rounded-full text-xs font-semibold text-white cursor-pointer">
                    <span x-text="lang === 'tr' ? 'Switch to 🇬🇧 EN' : '🇹🇷 TR\'ye Geç'"></span>
                </button>
            </div>
        </div>

    </div>

    <!-- VISITORS BADGE -->
    <div class="mt-8 z-10 opacity-30 hover:opacity-80 transition-opacity duration-500 scale-90 filter grayscale hover:grayscale-0">
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgithub.com%2Fproject_overdrive&count_bg=%231e293b&title_bg=%23090d16&title=SYS_VAL_TRAFFIC&edge_flat=false" alt="Visitor Counter"/>
    </div>

    <script>
        function overdriveApp() {
            return {
                lang: 'tr',
                currentStage: 'boot',
                bootLogs: [],
                isBootingComplete: false,
                currentQuestion: 0,
                toxicScore: 0,
                glitchState: null,

                translations: {
                    tr: {
                        enterBtn: "SİSTEME GİRİŞ YAP",
                        resultTitle: "Nöronal Karar Matrisi",
                        verdict: "Net Toksiklik Hesaplaması",
                        resultPerfect: "🤖 Kusursuz Mantık! İlişki algoritmalarında hata payı sıfır, gerçek bir Green Flag lideri.",
                        resultMid: "⚡ Standart İnsani Hatalar. Kabul edilebilir bug'lar bulundu fakat genel sistem stabil.",
                        resultToxic: "💀 KRİTİK ALARM! Toksiklik seviyesi sınırı aştı. Acilen karantinaya alınması önerilir."
                    },
                    en: {
                        enterBtn: "ACCESS SYSTEM CORE",
                        resultTitle: "Neural Decision Matrix",
                        verdict: "Net Toxicity Calculation",
                        resultPerfect: "🤖 Flawless Logic! Zero margin of error in relationship algorithms, a true Green Flag leader.",
                        resultMid: "⚡ Standard Human Bugs. Acceptable glitches detected, but the overall system is stable.",
                        resultToxic: "💀 CRITICAL WARNING! Toxicity levels breached safety limits. Immediate quarantine recommended."
                    }
                },

                // 🌟 YENİ UZATILMIŞ VE EĞLENCELİ 10 SORU
                questions: [
                    {
                        tr: "Bütün gün bilgisayar başında kod yazıp ya da oyun oynayıp, mesajlara 5 saat sonra 'pardon görmemişim' diye dönüyor?",
                        en: "Spends all day coding or gaming, then replies to messages 5 hours later saying 'sorry didn't see it'?"
                    },
                    {
                        tr: "Sırf 'estetik ve siberpunk duruyor' diye bütün odasını uyuyamayacak derecede mor neon ışıkla doldurmuş?",
                        en: "Filled their entire bedroom with blinding purple neon lights just because 'it looks aesthetic and cyberpunk'?"
                    },
                    {
                        tr: "Instagram'da 2500 kişiyi takip ediyor, hikayelerine herkesi ekliyor ama seni bir türlü yakın arkadaşlarına (Close Friends) eklemiyor?",
                        en: "Follows 2500 people on Instagram, adds everyone to stories, but still hasn't added you to Close Friends?"
                    },
                    {
                        tr: "Garson hesap pusulasını masaya bıraktığı an aniden çok acil bir telefon araması gelmiş gibi masadan kalkıyor?",
                        en: "The moment the waiter drops the bill on the table, they suddenly rush out pretending to have an emergency call?"
                    },
                    {
                        tr: "Yemek yerken veya buluşmuşken sürekli yapay zekanın dünyayı ele geçireceğini ve insanlığın biteceğini anlatıp duruyor?",
                        en: "During dates, constantly rants about how AI is going to take over the world and eradicate humanity?"
                    },
                    {
                        tr: "Eski sevgilisinden bahsederken 'Aslında iyi biriydi ama psikolojik sorunları beni yordu' diyerek kendini sütten çıkmış ak kaşık yapıyor?",
                        en: "When talking about their ex, says 'They were nice but their mental issues drained me' to act completely innocent?"
                    },
                    {
                        tr: "Tartışırken haksız olduğunu anladığı an konuyu değiştirip 'Sen zaten geçen sene de bana böyle yapmıştın' diye eski defterleri açıyor?",
                        en: "The moment they realize they are wrong in an argument, they bring up old stuff like 'Well, you did this to me last year'?"
                    },
                    {
                        tr: "Sosyal medyada paylaştığı her fotoğrafın altına mutlaka felsefi, ağır veya İngilizce siber siber cümleler yazıyor?",
                        en: "Writes heavy philosophical, deep, or cryptic English quotes under every single picture they post?"
                    },
                    {
                        tr: "Birlikte bir plan yapacakken asla sorumluluk almayıp her şeye 'Fark etmez, sen seç, bana uyar' diyerek hayalet gibi takılıyor?",
                        en: "Never takes responsibility when planning a date, acting like a ghost with 'I don't care, you choose, fine by me'?"
                    },
                    {
                        tr: "Gecenin üçünde aniden 'Uydun mu?' (Uyanık mısın?) diye mesaj atıp, cevap verince ertesi gün öğlene kadar bir daha yazmıyor?",
                        en: "Texts 'U up?' at 3 AM, and after you reply, doesn't text back until noon the next day?"
                    }
                ],

                allLogs: [
                    "SYSTEM_BOOT_INITIALIZED...",
                    "LOADING ENCRYPTED NEURAL INTERFACE...",
                    "ESTABLISHING LIQUID_GLASS_RENDERER...",
                    "CONNECTING GLOBAL_TRAFFIC_COUNTER... [OK]",
                    "ANALYSIS MODULES STATUS: SECURE."
                ],

                init() {
                    let delay = 0;
                    this.allLogs.forEach((log, index) => {
                        setTimeout(() => {
                            this.bootLogs.push(log);
                            if (index === this.allLogs.length - 1) {
                                this.isBootingComplete = true;
                            }
                        }, delay);
                        delay += 200;
                    });
                },

                t(key) {
                    return this.translations[this.lang][key];
                },

                toggleLang() {
                    this.lang = this.lang === 'tr' ? 'en' : 'tr';
                },

                enterCoreSystem() {
                    this.currentStage = 'main_hud';
                },

                handleChoice(type) {
                    this.glitchState = type;
                    setTimeout(() => this.glitchState = null, 400);

                    // 10 soru olduğu için her red flag skoru %10 artırır
                    if (type === 'red') {
                        this.toxicScore += 10;
                    }

                    if (this.currentQuestion < this.questions.length - 1) {
                        this.currentQuestion++;
                    } else {
                        if (this.toxicScore > 100) this.toxicScore = 100;
                        this.currentStage = 'result';
                    }
                },

                getResultComment() {
                    if (this.toxicScore <= 20) return this.t('resultPerfect');
                    if (this.toxicScore <= 60) return this.t('resultMid');
                    return this.t('resultToxic');
                },

                restartGame() {
                    this.currentQuestion = 0;
                    this.toxicScore = 0;
                    this.currentStage = 'main_hud';
                },

                initMatrix() {
                    const canvas = document.getElementById('matrix-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    const alphabet = "010101".split("");
                    const fontSize = 14;
                    const columns = canvas.width / fontSize;
                    const rainDrops = Array(Math.floor(columns)).fill(1);

                    const draw = () => {
                        ctx.fillStyle = 'rgba(13, 15, 26, 0.08)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#a855f7';
                        ctx.font = fontSize + 'px monospace';

                        for (let i = 0; i < rainDrops.length; i++) {
                            const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.98) {
                                rainDrops[i] = 0;
                            }
                            rainDrops[i]++;
                        }
                    };
                    setInterval(draw, 40);
                    window.addEventListener('resize', () => {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                    });
                }
            }
        }
    </script>
</body>
</html>
